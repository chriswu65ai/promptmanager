name: Validate Supabase Migrations

on:
  pull_request:
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-migrations-validate.yml'
      - 'scripts/build-schema-installer.mjs'
      - 'supabase/installer/schema.sql'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-migrations-validate.yml'
      - 'scripts/build-schema-installer.mjs'
      - 'supabase/installer/schema.sql'
      - 'package.json'

jobs:
  validate-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify schema installer is synchronized
        run: npm run check:schema-installer

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Apply migrations end-to-end
        run: supabase db reset --local --debug

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup
